# Uploads test coverage to GitHub's native Code Quality / Code Coverage.
# After this runs, github-code-quality[bot] posts a coverage summary on pull requests.
# Requires Code Quality to be enabled for the repository (Settings > Code quality).
name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  code-quality: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      # Check out the PR head commit (not the merge commit) so coverage line
      # numbers map correctly to the diff.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      # Produces coverage.xml in Cobertura format for the coverage_demo package.
      - name: Run tests with coverage
        run: pytest --cov=coverage_demo --cov-report=xml

      # Native GitHub upload (replaces third-party tools like Codecov/Coveralls).
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
